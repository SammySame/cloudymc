name: Build Docker Image and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build latest
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          target: prod
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            org.opencontainers.image.version:${{ inputs.version }}
            ghcr.io/sammysame/cloudymc:${{ inputs.version }}
            ghcr.io/sammysame/cloudymc:latest
          cache-from: type=registry,ref=ghcr.io/sammysame/cloudymc:buildcache
          cache-to: type=registry,ref=ghcr.io/sammysame/cloudymc:buildcache,mode=max

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$VERSION" \
          --repo "$GITHUB_REPOSITORY" \
          --title "$VERSION" \
          --generate-notes \
          --draft
