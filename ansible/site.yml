- name: initial system configuration
  hosts: all
  tags: initial
  vars:
    ansible_user: "{{ default_user }}"
  roles:
    - bootstrap
    - ssh

- name: setup necessary software and start minecraft server
  hosts: all
  gather_facts: true
  vars:
    ansible_user: "{{ ansible_user_name }}"
  roles:
    - role: docker
      tags: software
    - role: minecraft
      tags: minecraft
