- name: create basic user groups
  become: true
  ansible.builtin.group:
    name: "{{ item }}"
    gid_min: 1000
    state: present
  loop:
    - "{{ cloudymc_sudo_group }}"
    - "{{ cloudymc_su_group }}"
    - "{{ cloudymc_ssh_group }}"
    - "{{ cloudymc_sftp_group }}"
    - "{{ cloudymc_ansible_group }}"

- name: assign created groups to the default user
  become: true
  ansible.builtin.user:
    name: "{{ cloudymc_default_user }}"
    groups:
      - "{{ cloudymc_sudo_group }}"
      - "{{ cloudymc_su_group }}"
      - "{{ cloudymc_ssh_group }}"
    append: true
    state: present

- name: create ansible user
  become: true
  ansible.builtin.user:
    name: "{{ cloudymc_ansible_user }}"
    group: "{{ cloudymc_ansible_group }}"
    groups:
      - "{{ cloudymc_sudo_group }}"
      - "{{ cloudymc_su_group }}"
      - "{{ cloudymc_ssh_group }}"
    shell: /bin/bash
    uid_min: 1000
    state: present

- name: supply authorized key for the ansible user
  become: true
  ansible.posix.authorized_key:
    user: "{{ cloudymc_ansible_user }}"
    key: "{{ lookup('ansible.builtin.file', ansible_ssh_public_key_file) }}"
    manage_dir: true
    exclusive: true
    state: present
