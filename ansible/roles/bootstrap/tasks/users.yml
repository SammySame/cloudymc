- name: create basic user groups
  become: true
  ansible.builtin.group:
    name: "{{ item }}"
    gid_min: 1000
    state: present
  loop:
    - "{{ sudo_group }}"
    - "{{ su_group }}"
    - "{{ ssh_group }}"
    - "{{ sftp_group }}"
    - "{{ ansible_group }}"

- name: assign created groups to the default user
  become: true
  ansible.builtin.user:
    name: "{{ default_user }}"
    groups:
      - "{{ sudo_group }}"
      - "{{ su_group }}"
      - "{{ ssh_group }}"
    append: true
    state: present

- name: create ansible user
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user_name }}"
    group: "{{ ansible_group }}"
    groups:
      - "{{ sudo_group }}"
      - "{{ su_group }}"
      - "{{ ssh_group }}"
    shell: /bin/bash
    uid_min: 1000
    state: present

- name: supply authorized key for the ansible user
  become: true
  ansible.posix.authorized_key:
    user: "{{ ansible_user_name }}"
    key: "{{ lookup('ansible.builtin.file', ansible_ssh_public_key_file) }}"
    manage_dir: true
    exclusive: true
    state: present
